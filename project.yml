name: Aisly
options:
  bundleIdPrefix: com.levilunique
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    DEVELOPMENT_LANGUAGE: en
targets:
  Aisly:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Aisly
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levilunique.aisly
        INFOPLIST_FILE: Aisly/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: NO
    scheme:
      testTargets:
        - AislyTests
        - AislyUITests
  AislyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AislyTests
    dependencies:
      - target: Aisly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levilunique.aislyTests
        GENERATE_INFOPLIST_FILE: YES
  AislyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AislyUITests
      - path: Shared
    dependencies:
      - target: Aisly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levilunique.aislyUITests
        GENERATE_INFOPLIST_FILE: YES
