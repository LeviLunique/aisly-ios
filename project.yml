name: Aisly
options:
  bundleIdPrefix: com.levilunique
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    DEVELOPMENT_LANGUAGE: en
targets:
  Aisly:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Aisly
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levilunique.aisly
        INFOPLIST_FILE: Aisly/Info.plist
        CODE_SIGN_ENTITLEMENTS: Aisly/Aisly.entitlements
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: AislyWidgets
        embed: true
    scheme:
      testTargets:
        - AislyTests
        - AislyUITests
  AislyWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AislyWidgets
      - path: Shared
      - path: Aisly/App/Localization
      - path: Aisly/Domain
      - path: Aisly/Infrastructure/Persistence
      - path: Aisly/DesignSystem/Tokens
    resources:
      - path: Aisly/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levilunique.aisly.widgets
        INFOPLIST_FILE: AislyWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: AislyWidgets/AislyWidgets.entitlements
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: ""
  AislyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AislyTests
    dependencies:
      - target: Aisly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levilunique.aislyTests
        GENERATE_INFOPLIST_FILE: YES
  AislyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AislyUITests
      - path: Shared/Localization/AppTextKeys.swift
    dependencies:
      - target: Aisly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levilunique.aislyUITests
        GENERATE_INFOPLIST_FILE: YES
